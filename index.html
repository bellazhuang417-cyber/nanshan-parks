<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>探索南山 | Explore Nanshan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ==========================================
   探索南山 v10 — 移动端优先重新设计
   Design: 保持羊皮纸暖调，底部抽屉交互
   ========================================== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --parchment:      #f5f4ed;
    --ivory:          #faf9f5;
    --warm-sand:      #e8e6dc;
    --near-black:     #141413;
    --charcoal:       #4d4c48;
    --olive-gray:     #5e5d59;
    --stone-gray:     #87867f;
    --warm-silver:    #b0aea5;
    --border-cream:   #f0eee6;
    --border-warm:    #e8e6dc;
    --ring:           #d1cfc5;
    --terracotta:     #c96442;
    --coral:          #d97757;

    /* POI Type Colors */
    --sunrise:        #5B9BD5;
    --sunrise-glow:   rgba(91,155,213,0.30);
    --sunrise-bg:     #EEF5FB;
    --sunset:         #E8943A;
    --sunset-glow:    rgba(232,148,58,0.30);
    --sunset-bg:      #FEF5EB;
    --cycling:        #4ADE80;
    --cycling-glow:   rgba(74,222,128,0.30);
    --cycling-bg:     #EDFCF2;
    --running:        #A78BFA;
    --running-glow:   rgba(167,139,250,0.30);
    --running-bg:     #F3EEFF;
    --sports:         #F472B6;
    --sports-glow:    rgba(244,114,182,0.30);
    --sports-bg:      #FDF0F7;
    --kids:           #FACC15;
    --kids-glow:      rgba(250,204,21,0.25);
    --kids-bg:        #FEFCE8;
    --parking:        #94A3B8;
    --parking-glow:   rgba(148,163,184,0.20);
    --parking-bg:     #F1F5F9;
    --restroom:       #67E8F9;
    --restroom-glow:  rgba(103,232,249,0.25);
    --restroom-bg:    #ECFEFF;

    /* Layout Tokens */
    --r-xs:  8px;
    --r-sm:  12px;
    --r-md:  16px;
    --r-lg:  20px;
    --r-xl:  28px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);

    --shadow-soft: 0 2px 16px rgba(0,0,0,0.06);
    --shadow-card:  0 4px 24px rgba(0,0,0,0.08);
    --shadow-sheet: 0 -4px 32px rgba(0,0,0,0.12);
    --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
    --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Text', 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--parchment);
    color: var(--near-black);
}

/* ── Map ── */
#map { position: absolute; top: 0; right: 0; bottom: 0; left: 0; z-index: 0; }
.leaflet-control-zoom { border: none !important; box-shadow: var(--shadow-soft) !important; border-radius: var(--r-sm) !important; overflow: hidden; }
.leaflet-control-zoom a { width: 36px !important; height: 36px !important; line-height: 36px !important; font-size: 16px !important; color: var(--charcoal) !important; border: none !important; background: var(--ivory) !important; backdrop-filter: blur(12px); transition: background .15s ease; }
.leaflet-control-zoom a:hover { background: var(--warm-sand) !important; }
.leaflet-control-attribution { font-size: 10px !important; background: rgba(245,244,237,0.7) !important; backdrop-filter: blur(4px); border-radius: 5px 0 0 0 !important; padding: 3px 8px !important; color: var(--stone-gray) !important; }

/* ── POI Markers ── */
.poi-marker { position: relative; width: 36px; height: 36px; cursor: pointer; transition: transform .3s var(--ease-out); }
.poi-marker:hover { transform: scale(1.15); z-index: 1000 !important; }
.poi-marker.active-poi .marker-dot { box-shadow: 0 0 0 3px var(--near-black), 0 4px 16px currentColor; transform: scale(1.1); }
.pulse-ring { position: absolute; inset: -5px; border-radius: 50%; border: 1.5px solid currentColor; opacity: 0; animation: pulse 2.5s ease-out infinite; pointer-events: none; }
@keyframes pulse { 0% { transform: scale(0.85); opacity: 0.5; } 70% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(1.3); opacity: 0; } }
.marker-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
.marker-dot.sunrise { background: var(--sunrise); color: var(--sunrise); box-shadow: 0 2px 8px var(--sunrise-glow), 0 0 0 3px rgba(91,155,213,0.1); }
.marker-dot.sunset { background: var(--sunset); color: var(--sunset); box-shadow: 0 2px 8px var(--sunset-glow), 0 0 0 3px rgba(232,148,58,0.1); }
.marker-dot.cycling { background: var(--cycling); color: var(--cycling); box-shadow: 0 2px 8px var(--cycling-glow), 0 0 0 3px rgba(74,222,128,0.1); }
.marker-dot.running { background: var(--running); color: var(--running); box-shadow: 0 2px 8px var(--running-glow), 0 0 0 3px rgba(167,139,250,0.1); }
.marker-dot.sports { background: var(--sports); color: var(--sports); box-shadow: 0 2px 8px var(--sports-glow), 0 0 0 3px rgba(244,114,182,0.1); }
.marker-dot.kids { background: var(--kids); color: var(--kids); box-shadow: 0 2px 8px var(--kids-glow), 0 0 0 3px rgba(250,204,21,0.08); }
.marker-dot.parking { background: var(--parking); color: var(--parking); box-shadow: 0 2px 8px var(--parking-glow), 0 0 0 3px rgba(148,163,184,0.1); }
.marker-dot.restroom { background: var(--restroom); color: var(--restroom); box-shadow: 0 2px 8px var(--restroom-glow), 0 0 0 3px rgba(103,232,249,0.1); }
.marker-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; }
.marker-icon svg { width: 18px; height: 18px; fill: none; }
.marker-icon svg, .child-poi-icon svg, .brand-icon svg { visibility: visible !important; opacity: 1 !important; }
.poi-marker.explored .marker-dot { opacity: 0.4; box-shadow: none; }
.poi-marker.explored .pulse-ring { animation: none; opacity: 0; }
.poi-marker.explored:hover .marker-dot { opacity: 0.65; }
.poi-marker.just-explored { animation: explorePop .4s var(--ease-bounce); }
@keyframes explorePop { 0% { transform: scale(1); } 40% { transform: scale(1.3); } 100% { transform: scale(1); } }
.park-label { background: none; border: none; box-shadow: none; font-family: -apple-system, 'PingFang SC', sans-serif; font-size: 11px; font-weight: 500; color: var(--near-black); text-shadow: 0 0 8px rgba(245,244,237,1), 0 0 16px rgba(245,244,237,0.7); white-space: nowrap; padding: 1px 5px; pointer-events: none; letter-spacing: .3px; }

/* ── Top Bar ── */
.top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px 10px 16px;
    padding-bottom: calc(10px + var(--safe-bottom));
    background: var(--ivory);
    border-bottom: 1px solid var(--border-warm);
}
.brand { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.brand-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.brand-icon svg { width: 20px; height: 20px; fill: none; visibility: visible !important; opacity: 1 !important; }
.brand-text { font-size: 16px; font-weight: 600; color: var(--near-black); letter-spacing: -.2px; }
.top-bar-spacer { flex: 1; }
.lang-btn {
    flex-shrink: 0;
    padding: 5px 10px;
    border: 1px solid var(--border-warm);
    border-radius: var(--r-sm);
    background: transparent;
    font-size: 12px; font-weight: 500;
    color: var(--olive-gray);
    cursor: pointer;
    transition: all .15s ease;
}
.lang-btn:hover { background: var(--warm-sand); color: var(--near-black); }
.menu-btn {
    flex-shrink: 0;
    width: 34px; height: 34px;
    border: 1px solid var(--border-warm);
    border-radius: var(--r-sm);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--olive-gray);
    transition: all .15s ease;
}
.menu-btn:hover { background: var(--warm-sand); color: var(--near-black); }
.menu-btn.active { background: var(--near-black); color: var(--ivory); border-color: var(--near-black); }

/* ── Search Row ── */
.search-row {
    position: fixed;
    top: 57px;
    left: 0; right: 0;
    z-index: 999;
    padding: 8px 16px;
    background: var(--parchment);
}
.search-box {
    position: relative;
    display: flex;
    align-items: center;
}
.search-icon { position: absolute; left: 12px; color: var(--stone-gray); pointer-events: none; z-index: 1; }
.search-box input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1px solid var(--border-warm);
    border-radius: var(--r-md);
    background: var(--ivory);
    font-size: 14px;
    color: var(--near-black);
    outline: none;
    transition: all .2s ease;
}
.search-box input::placeholder { color: var(--stone-gray); }
.search-box input:focus {
    border-color: var(--terracotta);
    box-shadow: 0 0 0 3px rgba(201,100,66,0.12);
}

/* ── Filter Bar ── */
.filter-bar {
    position: fixed;
    top: 115px;
    left: 0; right: 0;
    z-index: 998;
    padding: 0 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-behavior: smooth;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
}
.filter-bar::-webkit-scrollbar { display: none; }
.chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    border: 1px solid var(--border-warm);
    border-radius: 20px;
    background: var(--ivory);
    font-size: 13px; font-weight: 500;
    color: var(--olive-gray);
    cursor: pointer;
    transition: all .2s ease;
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: var(--ring-sm);
}
.chip:hover { background: var(--warm-sand); color: var(--near-black); }
.chip.active { background: var(--near-black); color: var(--ivory); border-color: var(--near-black); box-shadow: none; }
.chip.active .chip-dot { background: var(--ivory); }
.chip-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; transition: background .15s; flex-shrink: 0; }
.chip-dot.sunrise  { background: var(--sunrise); }
.chip-dot.sunset   { background: var(--sunset); }
.chip-dot.cycling  { background: var(--cycling); }
.chip-dot.running  { background: var(--running); }
.chip-dot.sports   { background: var(--sports); }
.chip-dot.kids     { background: var(--kids); }
.chip-dot.parking  { background: var(--parking); }
.chip-dot.restroom { background: var(--restroom); }
.chip-dot.all      { background: var(--stone-gray); }
.chip-label { display: flex; align-items: center; gap: 5px; }
.chip-count { font-size: 11px; font-weight: 500; opacity: .45; }

/* ── Mini Explore Counter (mobile FAB style) ── */
.explore-counter {
    position: fixed;
    bottom: 24px;
    left: 16px;
    z-index: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 8px 8px;
    background: var(--ivory);
    border: 1px solid var(--border-warm);
    border-radius: 28px;
    cursor: default;
    box-shadow: var(--shadow-card);
    transition: transform .3s var(--ease-bounce);
}
.explore-counter:active { transform: scale(0.95); }
.counter-ring { position: relative; width: 32px; height: 32px; flex-shrink: 0; }
.counter-ring svg { width: 32px; height: 32px; display: block; }
#progress-ring { transition: stroke-dashoffset .6s var(--ease-bounce); }
.counter-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    color: var(--terracotta);
}
.counter-label { display: flex; flex-direction: column; line-height: 1.25; }
.counter-label span:first-child { font-size: 11px; font-weight: 600; color: var(--near-black); }
.counter-label span:last-child { font-size: 10px; color: var(--stone-gray); }

/* ── Directory FAB (bottom right on mobile) ── */
.dir-fab {
    position: fixed;
    bottom: 24px;
    right: 16px;
    z-index: 500;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--near-black);
    color: var(--ivory);
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: var(--shadow-card);
    transition: transform .3s var(--ease-bounce), background .15s ease;
}
.dir-fab:hover { transform: scale(1.08); }
.dir-fab:active { transform: scale(0.95); }
.dir-fab.active {
    background: var(--terracotta);
    transform: scale(1.05);
}
.dir-fab svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

/* ── Directory Bottom Sheet ── */
.dir-sheet-overlay {
    position: fixed; inset: 0;
    z-index: 1500;
    background: rgba(20,20,19,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
}
.dir-sheet-overlay.active { opacity: 1; pointer-events: auto; }
.dir-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1600;
    background: var(--ivory);
    border-radius: 20px 20px 0 0;
    box-shadow: var(--shadow-sheet);
    transform: translateY(100%);
    opacity: 0;
    transition: transform .4s var(--ease-out), opacity .3s ease;
    max-height: 78vh;
    display: flex;
    flex-direction: column;
    padding-bottom: var(--safe-bottom);
}
.dir-sheet.open {
    transform: translateY(0);
    opacity: 1;
}
.dir-sheet-handle {
    width: 36px; height: 4px;
    border-radius: 2px;
    background: var(--border-warm);
    margin: 10px auto 0;
    flex-shrink: 0;
}
.dir-sheet-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px 8px;
    flex-shrink: 0;
}
.dir-sheet-title {
    font-size: 17px; font-weight: 700;
    color: var(--near-black);
}
.dir-sheet-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--warm-sand);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--olive-gray);
    font-size: 18px; line-height: 1;
    transition: background .15s;
}
.dir-sheet-close:hover { background: var(--border-warm); }
.dir-sheet-search {
    padding: 0 14px 8px;
    flex-shrink: 0;
}
.dir-sheet-search input {
    width: 100%;
    padding: 9px 12px 9px 36px;
    border: 1px solid var(--border-warm);
    border-radius: var(--r-sm);
    background: var(--warm-sand);
    font-size: 14px; color: var(--near-black);
    outline: none; transition: all .2s;
}
.dir-sheet-search input::placeholder { color: var(--stone-gray); }
.dir-sheet-search input:focus {
    border-color: var(--terracotta);
    background: var(--ivory);
    box-shadow: 0 0 0 3px rgba(201,100,66,0.10);
}
.dir-sheet-search-icon {
    position: absolute; left: 22px;
    color: var(--stone-gray);
    pointer-events: none;
    font-size: 14px;
}
.dir-sheet-search-wrap { position: relative; }
.dir-sheet-body {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 10px 16px;
    min-height: 0;
}
.dir-sheet-body::-webkit-scrollbar { width: 3px; }
.dir-sheet-body::-webkit-scrollbar-thumb { background: var(--border-warm); border-radius: 3px; }
.dir-sheet-footer {
    padding: 8px 18px;
    border-top: 1px solid var(--border-warm);
    flex-shrink: 0;
    font-size: 11px; color: var(--stone-gray);
    text-align: center;
}

/* ── Park Card ── */
.park-card { margin-bottom: 2px; border-radius: var(--r-sm); overflow: hidden; transition: background .15s; }
.park-card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 12px;
    cursor: pointer;
    border-radius: var(--r-sm);
    transition: background .15s;
    user-select: none;
}
.park-card-header:hover { background: var(--warm-sand); }
.park-card-header.selected { background: rgba(201,100,66,0.07); }
.park-card-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.park-card-name {
    font-size: 14px; font-weight: 600;
    color: var(--near-black);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 5px;
}
.park-card-count { font-size: 11px; color: var(--stone-gray); font-weight: 400; }
.park-card-expand {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    color: var(--stone-gray);
    transition: transform .25s ease; flex-shrink: 0;
}
.park-card-expand svg { width: 14px; height: 14px; fill: none; }
.park-card.expanded .park-card-expand { transform: rotate(180deg); }
.park-card-tags { display: flex; gap: 4px; flex-wrap: wrap; padding: 0 12px 6px; }
.type-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 8px; font-size: 11px; font-weight: 500; }
.popular-badge {
    display: inline-flex; align-items: center;
    padding: 1px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 600;
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white; letter-spacing: .3px;
    white-space: nowrap; flex-shrink: 0;
}
.park-card-desc { font-size: 12px; color: var(--olive-gray); line-height: 1.5; padding: 2px 12px 4px; }
.type-tag .tt-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.type-tag.sunrise  { background: var(--sunrise-bg); color: #3B82C6; }
.type-tag.sunset   { background: var(--sunset-bg); color: #C67A2A; }
.type-tag.cycling  { background: var(--cycling-bg); color: #22945A; }
.type-tag.running  { background: var(--running-bg); color: #7C3AED; }
.type-tag.sports   { background: var(--sports-bg); color: #DB2777; }
.type-tag.kids     { background: var(--kids-bg); color: #A16207; }
.type-tag.parking  { background: var(--parking-bg); color: #64748B; }
.type-tag.restroom { background: var(--restroom-bg); color:#0891B2; }

/* ── Child POI Items ── */
.child-pois { display: none; padding: 0 12px 10px 30px; }
.park-card.expanded .child-pois { display: block; }
.child-poi-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    cursor: pointer;
    border-radius: var(--r-xs);
    transition: background .15s;
    margin-bottom: 2px;
}
.child-poi-item:hover { background: var(--warm-sand); }
.child-poi-item:active { background: var(--border-warm); }
.child-poi-item.active { background: var(--ivory); box-shadow: var(--ring-sm); }
.child-poi-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.child-poi-icon svg { width: 14px; height: 14px; fill: none; visibility: visible !important; opacity: 1 !important; }
.child-poi-text { flex: 1; min-width: 0; }
.child-poi-name { font-size: 14px; color: var(--near-black); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; line-height: 1.3; }
.child-poi-desc { font-size: 11px; color: var(--stone-gray); margin-top: 1px; }

/* ── POI Bottom Sheet ── */
.poi-sheet-overlay {
    position: fixed; inset: 0;
    z-index: 1200;
    background: rgba(20,20,19,0.35);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s ease;
}
.poi-sheet-overlay.active { opacity: 1; pointer-events: auto; }
.poi-sheet {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 1300;
    background: var(--ivory);
    border-radius: 20px 20px 0 0;
    box-shadow: var(--shadow-sheet);
    transform: translateY(100%);
    opacity: 0;
    transition: transform .4s var(--ease-out), opacity .3s ease;
    max-height: 85vh;
    display: flex; flex-direction: column;
    padding-bottom: var(--safe-bottom);
    overflow: hidden;
}
.poi-sheet.open {
    transform: translateY(0);
    opacity: 1;
}
.poi-sheet-handle {
    width: 36px; height: 4px;
    border-radius: 2px;
    background: var(--border-warm);
    margin: 10px auto 0;
    flex-shrink: 0;
    cursor: grab;
}
.poi-sheet-scroll {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
}
.poi-sheet-scroll::-webkit-scrollbar { width: 3px; }
.poi-sheet-scroll::-webkit-scrollbar-thumb { background: var(--border-warm); border-radius: 3px; }
.poi-sheet-header {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 18px 10px;
    flex-shrink: 0;
}
.poi-sheet-icon {
    width: 44px; height: 44px;
    border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
}
.poi-sheet-icon svg { width: 22px; height: 22px; fill: none; }
.poi-sheet-titles { flex: 1; min-width: 0; padding-top: 2px; }
.poi-sheet-name {
    font-size: 18px; font-weight: 700;
    color: var(--near-black);
    line-height: 1.3;
}
.poi-sheet-park {
    display: flex; align-items: center; gap: 4px;
    margin-top: 3px;
}
.poi-sheet-park svg { width: 11px; height: 11px; color: var(--stone-gray); flex-shrink: 0; fill: none; }
.poi-sheet-park-name { font-size: 13px; color: var(--stone-gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.poi-sheet-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: var(--warm-sand);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--olive-gray);
    font-size: 18px; line-height: 1;
    transition: background .15s;
    flex-shrink: 0;
}
.poi-sheet-close:hover { background: var(--border-warm); }
.poi-sheet-body { padding: 0 18px 24px; display: flex; flex-direction: column; gap: 12px; }
.poi-sheet-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.poi-sheet-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px; font-weight: 500;
}
.poi-sheet-badge.time { background: var(--warm-sand); color: var(--olive-gray); }
.poi-sheet-badge .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.poi-sheet-badge.low    { background: var(--cycling-bg); color: #22945A; }
.poi-sheet-badge.medium { background: var(--sunset-bg); color: #C67A2A; }
.poi-sheet-badge.high   { background: #FEE2E2; color: #DC4545; }
.poi-sheet-badge .badge-icon { width: 14px; height: 14px; }
.poi-sheet-badge .badge-icon svg { width: 14px; height: 14px; fill: none; }
.poi-sheet-tip {
    display: flex; gap: 12px;
    padding: 14px;
    border-radius: var(--r-sm);
    font-size: 14px; color: var(--charcoal);
    line-height: 1.7;
}
.poi-sheet-tip-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
}
.poi-sheet-tip-icon svg { width: 13px; height: 13px; fill: none; }
.poi-sheet-park-section {
    padding-top: 12px;
    border-top: 1px solid var(--border-warm);
}
.poi-sheet-park-label {
    font-size: 11px; font-weight: 700;
    color: var(--stone-gray);
    text-transform: uppercase; letter-spacing: .6px;
    margin-bottom: 6px;
}
.poi-sheet-park-desc { font-size: 13px; color: var(--olive-gray); line-height: 1.6; margin-bottom: 10px; }
.poi-sheet-park-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.poi-sheet-tag {
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 12px;
    background: var(--warm-sand);
    color: var(--olive-gray);
}

/* ── Toast ── */
.no-results {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    z-index: 800;
    padding: 14px 24px;
    background: var(--ivory);
    border-radius: var(--r-md);
    border: 1px solid var(--border-warm);
    box-shadow: var(--shadow-card);
    color: var(--stone-gray);
    font-size: 14px; text-align: center;
    pointer-events: none;
    animation: fadeInOut 2s ease forwards;
}
@keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%,-50%) scale(.96); } 15% { opacity: 1; transform: translate(-50%,-50%) scale(1); } 85% { opacity: 1; } 100% { opacity: 0; } }

/* ── Desktop overrides (≥ 768px) ── */
@media (min-width: 768px) {
    .dir-fab { display: none; }
    .explore-counter {
        bottom: 24px; left: 24px;
    }
    /* On desktop, directory panel is a side drawer like v9 */
    .dir-sheet {
        top: 0; bottom: 0;
        left: 0; right: auto;
        width: 360px; max-width: 85vw;
        border-radius: 0 20px 20px 0;
        max-height: 100%;
        transform: translateX(-120%);
    }
    .dir-sheet.open { transform: translateX(0); }
    .dir-sheet-handle { display: none; }
    .search-row {
        top: 0; right: 0;
        left: auto;
        padding: 10px 16px;
        background: transparent;
        pointer-events: none;
        width: 300px;
    }
    .search-box { pointer-events: auto; }
    .search-box input {
        background: rgba(250,249,245,0.85);
        backdrop-filter: blur(12px);
    }
    .top-bar { justify-content: space-between; }
    .top-bar-spacer { display: none; }
    .menu-btn { display: none; }
}

/* ── Reduced Motion ── */
@media (prefers-reduced-motion: reduce) {
    .pulse-ring, .poi-marker { animation-duration: .01ms !important; }
    .dir-sheet, .poi-sheet { transition-duration: .01ms !important; }
    #progress-ring { transition-duration: .01ms; }
}
</style>

function getIcon(type) { return ICON_SVGS[type] || ICON_SVGS.sunrise; }

function createMarkerIcon(type, extraClass = '') {
    const iconSvg = getIcon(type);
    const html = `<div class="poi-marker ${extraClass}"><div class="marker-dot ${type}"><div class="pulse-ring"></div><div class="marker-icon">${iconSvg}</div></div></div>`;
    return L.divIcon({
        className: '',
        html: html,
        iconSize: [36, 36],
        iconAnchor: [18, 18]
    });
}

// ==========================================
// MAP INIT
// ==========================================
function initMap() {
    map = L.map('map', {
        zoomControl: false,
        attributionControl: true,
        preferCanvas: true
    }).setView([22.528, 113.925], 13);

    const osmTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
    });

    const amapTiles = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
        attribution: '&copy; 高德地图',
        subdomains: '1234',
        maxZoom: 18
    });

    amapTiles.addTo(map);

    osmTiles.on('load', function() {
        if (map.hasLayer(amapTiles)) {
            map.removeLayer(amapTiles);
            osmTiles.addTo(map);
        }
    });

    amapTiles.on('tileerror', function(e) {
        if (map.hasLayer(amapTiles)) {
            map.removeLayer(amapTiles);
        }
        osmTiles.addTo(map);
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);
}

// ==========================================
// RENDER POIS ON MAP
// ==========================================
function renderPois(poisToShow) {
    Object.values(poiMarkers).forEach(m => m.remove());
    poiMarkers = {};
    poisToShow.forEach(poi => {
        const isExplored = explored.has(poi.id);
        const isActive = activePoiId === poi.id;
        const extraClass = [isExplored ? 'explored' : '', isActive ? 'active-poi' : ''].filter(Boolean).join(' ');
        const icon = createMarkerIcon(poi.type, extraClass);
        const marker = L.marker(poi.coordinates, { icon, zIndexOffset: isExplored ? 0 : 500 }).addTo(map);
        marker.on('click', () => openPoiSheet(poi));
        poiMarkers[poi.id] = marker;
    });
}

// ==========================================
// PARK LABELS
// ==========================================
function renderParkLabels() {
    labelMarkers.forEach(m => m.remove());
    labelMarkers = [];
    parks.forEach(park => {
        const labelCoord = [park.center[0] + 0.0025, park.center[1] + 0.001];
        const icon = L.divIcon({
            className: '',
            html: `<div class="park-label">${park.name[currentLang]}</div>`,
            iconSize: [100, 16],
            iconAnchor: [0, 8]
        });
        const marker = L.marker(labelCoord, { icon, interactive: false }).addTo(map);
        labelMarkers.push(marker);
    });
}

// ==========================================
// ACTIVE POI SYNC
// ==========================================
function setActivePoi(poiId) {
    if (activePoiId && poiMarkers[activePoiId]) {
        const oldEl = poiMarkers[activePoiId].getElement()?.querySelector('.poi-marker');
        if (oldEl) oldEl.classList.remove('active-poi');
    }
    activePoiId = poiId;
    if (poiId && poiMarkers[poiId]) {
        const newEl = poiMarkers[poiId].getElement()?.querySelector('.poi-marker');
        if (newEl) newEl.classList.add('active-poi');
    }
    syncDirectoryHighlight(poiId);
}

function syncDirectoryHighlight(poiId) {
    document.querySelectorAll('.child-poi-item').forEach(el => {
        el.classList.toggle('active', el.dataset.poiId == poiId);
    });
    if (poiId) {
        const poi = allPois.find(p => p.id == poiId);
        if (poi && !expandedParkIds.has(poi.parkId)) {
            toggleParkExpand(poi.parkId);
        }
        const activeEl = document.querySelector(`.child-poi-item[data-poi-id="${poiId}"]`);
        if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
}

// ==========================================
// SEARCH
// ==========================================
function searchPois(query) {
    if (!query) {
        filterByType(currentTypeFilter);
        return;
    }
    const q = query.toLowerCase();
    const filtered = allPois.filter(poi => {
        const park = parks.find(p => p.id === poi.parkId);
        return poi.label.zh.includes(q) || poi.label.en.toLowerCase().includes(q) || poi.parkName.zh.includes(q) || poi.parkName.en.toLowerCase().includes(q) || (park && park.description.zh.includes(q)) || (park && park.description.en.toLowerCase().includes(q));
    });
    renderPois(filtered);
    if (filtered.length > 0) {
        const bounds = L.latLngBounds(filtered.map(p => p.coordinates));
        map.fitBounds(bounds, { padding: [80, 80], maxZoom: 16 });
    }
    if (filtered.length === 0) showNoResults();
}

function showNoResults() {
    const existing = document.querySelector('.no-results');
    if (existing) return;
    const toast = document.createElement('div');
    toast.className = 'no-results';
    toast.textContent = i18n[currentLang].noResults;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2200);
}

    const total = allPois.length, count = explored.size, pct = count / total;
    document.getElementById('counter-num').textContent = count;
    document.getElementById('counter-fraction').textContent = `${count} / ${total} ${i18n[currentLang].pois}`;
    document.getElementById('progress-ring').setAttribute('stroke-dashoffset', CIRCUMFERENCE * (1 - pct));
}

// ==========================================
// FILTER BAR
// ==========================================
function buildTypeFilterBar() {
    const filterBar = document.getElementById('filter-bar');
    filterBar.innerHTML = '';

    const allBtn = document.createElement('button');
    allBtn.className = 'chip ' + (currentTypeFilter === 'all' ? 'active' : '');
    allBtn.dataset.type = 'all';
    allBtn.innerHTML = `<span class="chip-label"><span class="chip-dot all"></span><span data-i18n="filterAll">${i18n[currentLang].filterAll}</span></span><span class="chip-count">${allPois.length}</span>`;
    allBtn.addEventListener('click', () => filterByType('all'));
    filterBar.appendChild(allBtn);

    Object.entries(poiTypes).forEach(([type, info]) => {
        const count = allPois.filter(p => p.type === type).length;
        if (count === 0) return;
        const btn = document.createElement('button');
        btn.className = 'chip ' + (currentTypeFilter === type ? 'active' : '');
        btn.dataset.type = type;
        btn.innerHTML = `<span class="chip-label"><span class="chip-dot ${type}"></span><span>${info[currentLang]}</span></span><span class="chip-count">${count}</span>`;
        btn.addEventListener('click', () => filterByType(type));
        filterBar.appendChild(btn);
    });
}

function filterByType(type) {
    currentTypeFilter = type;
    document.querySelectorAll('.chip').forEach(c => {
        c.classList.toggle('active', c.dataset.type === type);
    });

    let filtered;
    if (type === 'all') {
        filtered = allPois;
    } else {
        filtered = allPois.filter(p => p.type === type);
    }
    renderPois(filtered);

    if (filtered.length > 0) {
        const bounds = L.latLngBounds(filtered.map(p => p.coordinates));
        map.fitBounds(bounds, { padding: [80, 80], maxZoom: 16 });
        if (type !== 'all') {
            openPoiSheet(filtered[0]);
        }
    }
    if (type === 'all') {
        closePoiSheet();
        setActivePoi(null);
    }
}

// ==========================================
// LANGUAGE
// ==========================================
function setLanguage(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    document.getElementById('lang-toggle').textContent = lang === 'zh' ? 'EN' : '中文';
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (i18n[lang][key]) el.textContent = i18n[lang][key];
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (i18n[lang][key]) el.placeholder = i18n[lang][key];
    });
    updateCounter();
    renderParkLabels();
    renderDirectory();
    buildTypeFilterBar();
}

function saveExplored() { try { localStorage.setItem('nanshan_explored', JSON.stringify([...explored])); } catch(e) {} }
function loadExplored() { try { const saved = localStorage.getItem('nanshan_explored'); if (saved) explored = new Set(JSON.parse(saved)); } catch(e) {} }

// ==========================================
// PARK DIRECTORY BOTTOM SHEET
// ==========================================
function renderDirectory(filterText = '') {
    const t = i18n[currentLang];
    const body = document.getElementById('dir-sheet-body');
    const footer = document.getElementById('dir-sheet-footer');

    let filteredParks = parks;
    if (filterText) {
        const q = filterText.toLowerCase();
        filteredParks = parks.filter(p => p.name.zh.includes(q) || p.name.en.toLowerCase().includes(q) || p.description.zh.includes(q));
    }

    const fragment = document.createDocumentFragment();

    filteredParks.forEach(park => {
        const isExpanded = expandedParkIds.has(park.id);
        const poiTypesInPark = [...new Set(park.pois.map(p => p.type))];
        const isPopular = POPULAR_PARKS.has(park.id);

        const cardDiv = document.createElement('div');
        cardDiv.className = 'park-card' + (isExpanded ? ' expanded' : '');
        cardDiv.dataset.parkId = park.id;

        const headerDiv = document.createElement('div');
        headerDiv.className = 'park-card-header';
        headerDiv.addEventListener('click', () => toggleParkExpand(park.id));

        const leftDiv = document.createElement('div');
        leftDiv.className = 'park-card-left';

        const nameDiv = document.createElement('div');
        nameDiv.className = 'park-card-name';
        nameDiv.innerHTML = park.name[currentLang] + (isPopular ? `<span class="popular-badge">${t.popular}</span>` : '');
        leftDiv.appendChild(nameDiv);

        const countDiv = document.createElement('div');
        countDiv.className = 'park-card-count';
        countDiv.textContent = park.pois.length + ' ' + t.childPoiCount;
        leftDiv.appendChild(countDiv);

        const expandDiv = document.createElement('div');
        expandDiv.className = 'park-card-expand';
        expandDiv.innerHTML = CHEVRON_DOWN;

        headerDiv.appendChild(leftDiv);
        headerDiv.appendChild(expandDiv);
        cardDiv.appendChild(headerDiv);

        const descDiv = document.createElement('div');
        descDiv.className = 'park-card-desc';
        descDiv.textContent = park.description[currentLang];
        cardDiv.appendChild(descDiv);

        const tagsDiv = document.createElement('div');
        tagsDiv.className = 'park-card-tags';
        poiTypesInPark.forEach(pt => {
            const typeInfo = poiTypes[pt];
            const tag = document.createElement('span');
            tag.className = `type-tag ${pt}`;
            tag.innerHTML = `<span class="tt-dot" style="background:${typeInfo.color}"></span>${typeInfo[currentLang]}`;
            tagsDiv.appendChild(tag);
        });
        cardDiv.appendChild(tagsDiv);

        const childDiv = document.createElement('div');
        childDiv.className = 'child-pois';
        park.pois.forEach(poi => {
            const typeInfo = poiTypes[poi.type];
            const itemDiv = document.createElement('div');
            itemDiv.className = 'child-poi-item' + (activePoiId === poi.id ? ' active' : '');
            itemDiv.dataset.poiId = poi.id;
            itemDiv.addEventListener('click', () => selectChildPoi(poi.id));

            const iconDiv = document.createElement('div');
            iconDiv.className = 'child-poi-icon';
            iconDiv.style.background = typeInfo.color;
            iconDiv.style.color = 'white';
            iconDiv.innerHTML = getIcon(poi.type);

            const textDiv = document.createElement('div');
            textDiv.className = 'child-poi-text';

            const nameSpan = document.createElement('div');
            nameSpan.className = 'child-poi-name';
            nameSpan.textContent = poi.label[currentLang];

            const descSpan = document.createElement('div');
            descSpan.className = 'child-poi-desc';
            descSpan.textContent = typeInfo[currentLang];

            textDiv.appendChild(nameSpan);
            textDiv.appendChild(descSpan);
            itemDiv.appendChild(iconDiv);
            itemDiv.appendChild(textDiv);
            childDiv.appendChild(itemDiv);
        });
        cardDiv.appendChild(childDiv);
        fragment.appendChild(cardDiv);
    });

    body.innerHTML = '';
    body.appendChild(fragment);
    footer.textContent = t.dirStats.replace('{parks}', parks.length).replace('{pois}', allPois.length);
}

function toggleParkExpand(parkId) {
    const wasExpanded = expandedParkIds.has(parkId);
    if (wasExpanded) expandedParkIds.delete(parkId);
    else expandedParkIds.add(parkId);
    renderDirectory(getDirSearchValue());
    if (!wasExpanded) {
        requestAnimationFrame(() => {
            const card = document.querySelector(`.park-card[data-park-id="${parkId}"]`);
            if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
    }
}

function selectChildPoi(poiId) {
    const poi = allPois.find(p => p.id === poiId);
    if (!poi) return;
    toggleDirectory(false);
    map.flyTo(poi.coordinates, Math.max(map.getZoom(), 16), { duration: 0.8 });
    setTimeout(() => openPoiSheet(poi), 300);
}

function getDirSearchValue() { return document.getElementById('dir-search-input')?.value.trim() || ''; }

function toggleDirectory(open) {
    directoryOpen = open;
    document.getElementById('dir-sheet').classList.toggle('open', open);
    document.getElementById('dir-sheet-overlay').classList.toggle('active', open);
    document.getElementById('dir-fab').classList.toggle('active', open);
    document.getElementById('dir-toggle').classList.toggle('active', open);
    if (open) renderDirectory();
}

// ==========================================
// EVENT BINDINGS
// ==========================================
function bindEvents() {
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (document.getElementById('poi-sheet').classList.contains('open')) {
                closePoiSheet();
            } else if (directoryOpen) {
                toggleDirectory(false);
            }
        }
    });

    let searchTimeout;
    document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchPois(e.target.value.trim()), 250);
    });

    document.getElementById('lang-toggle').addEventListener('click', () =>
        setLanguage(currentLang === 'zh' ? 'en' : 'zh')
    );

    // FAB button (mobile)
    document.getElementById('dir-fab').addEventListener('click', () => toggleDirectory(!directoryOpen));
    // Menu button (top bar)
    document.getElementById('dir-toggle').addEventListener('click', () => toggleDirectory(!directoryOpen));
    // Overlay click
    document.getElementById('dir-sheet-overlay').addEventListener('click', () => toggleDirectory(false));
    // Close button
    document.getElementById('dir-sheet-close').addEventListener('click', () => toggleDirectory(false));

    let dirSearchTimeout;
    document.getElementById('dir-search-input').addEventListener('input', (e) => {
        clearTimeout(dirSearchTimeout);
        dirSearchTimeout = setTimeout(() => renderDirectory(e.target.value.trim()), 200);
    });

    // Swipe to close POI sheet
    let touchStartY = 0;
    const poiSheet = document.getElementById('poi-sheet');
    const poiScroll = document.getElementById('poi-sheet-scroll');
    poiScroll.addEventListener('touchstart', (e) => {
        if (poiScroll.scrollTop === 0) {
            touchStartY = e.touches[0].clientY;
        }
    }, { passive: true });
    poiScroll.addEventListener('touchend', (e) => {
        if (touchStartY > 0 && poiScroll.scrollTop === 0) {
            const delta = e.changedTouches[0].clientY - touchStartY;
            if (delta > 60) closePoiSheet();
        }
        touchStartY = 0;
    }, { passive: true });

    // POI sheet handle drag to close
    let sheetTouchStartY = 0;
    const poiSheetHandle = document.getElementById('poi-sheet-handle');
    poiSheetHandle.addEventListener('touchstart', (e) => {
        sheetTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    poiSheetHandle.addEventListener('touchend', (e) => {
        if (sheetTouchStartY > 0) {
            const delta = e.changedTouches[0].clientY - sheetTouchStartY;
            if (delta > 40) closePoiSheet();
        }
        sheetTouchStartY = 0;
    }, { passive: true });
}
</script>
